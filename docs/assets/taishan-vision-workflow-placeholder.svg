      <text x="95" y="82" font-size="15" fill="#166534">系统 · 相机 · 接口</text>
    </g>
    <g transform="translate(515 160)">
      <rect width="190" height="120" rx="16" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
