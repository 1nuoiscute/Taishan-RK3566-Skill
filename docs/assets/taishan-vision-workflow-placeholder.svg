  <text x="600" y="98" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#52657d">图片占位符：后续可替换为实物图或正式架构图</text>
  <g font-family="sans-serif" text-anchor="middle">
    <g transform="translate(55 160)">
      <rect width="190" height="120" rx="16" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
